<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d3b66" />
    <title>Vacancies | Matiri Boys' Senior School</title>
    <meta name="description" content="View current school vacancies and recruitment updates." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/header.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/mobile.css" />
    <link rel="stylesheet" href="../styles/chat-assistant.css" />
    <link rel="icon" href="../logo/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="../logo/favicon.ico" type="image/x-icon" />
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { renderHeader } from '../js/modules/header.js';
      import { initChatAssistant } from '../js/chat-assistant.js';
      import { createOfflineNoticeMarkup, isBrowserOnline } from '../js/modules/network-status.js';

      const app = document.getElementById('app');
      const VACANCIES_STORAGE_KEY = 'school-vacancies';

      // Firebase configuration
      const FIREBASE_CONFIG = {
        apiKey: 'AIzaSyBIGqZLYcDg3CR5VamDwBhtOOfl2Y0NYeI',
        authDomain: 'timotech-films.firebaseapp.com',
        projectId: 'timotech-films',
        storageBucket: 'timotech-films.firebasestorage.app',
        messagingSenderId: '563809562931',
        appId: '1:563809562931:web:750ff7e819f2d57e9dce46',
      };

      let firebaseDb = null;
      if (FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId) {
        firebase.initializeApp(FIREBASE_CONFIG);
        firebaseDb = firebase.firestore();
      }

      function escapeHtml(value = '') {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function readStoredVacancies() {
        try {
          return JSON.parse(window.localStorage.getItem(VACANCIES_STORAGE_KEY) || '[]');
        } catch (error) {
          return [];
        }
      }

      async function fetchVacanciesFromFirestore() {
        if (!isBrowserOnline() || !firebaseDb) {
          return { vacancies: readStoredVacancies(), offline: true };
        }

        try {
          const snapshot = await firebaseDb.collection('vacancies').orderBy('createdAt', 'desc').get();
          const vacancies = [];
          snapshot.forEach((doc) => {
            vacancies.push({ ...doc.data(), id: doc.id });
          });
          return { vacancies: vacancies.length > 0 ? vacancies : readStoredVacancies(), offline: false };
        } catch (error) {
          console.warn('Firestore fetch failed, using localStorage:', error);
          return { vacancies: readStoredVacancies(), offline: true };
        }
      }

      function formatBadge(item) {
        const createdAt = item.createdAt ? new Date(item.createdAt) : null;
        if (!createdAt || Number.isNaN(createdAt.getTime())) {
          return '<span class="vacancies-badge vacancies-badge--new">New</span>';
        }

        const now = new Date();
        const oneWeekAgo = new Date(now);
        oneWeekAgo.setDate(now.getDate() - 7);

        if (createdAt >= oneWeekAgo) {
          return '<span class="vacancies-badge vacancies-badge--new">New</span>';
        }

        return `<span class="vacancies-badge vacancies-badge--date">${createdAt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}</span>`;
      }

      async function renderPage() {
        if (!app) {
          return;
        }

        app.innerHTML = '';
        app.appendChild(renderHeader());

        const section = document.createElement('section');
        section.className = 'vacancies-page';
        section.innerHTML = `
          <div class="container">
            <div class="vacancies-card">
              <div class="standalone-topbar">
                <button type="button" class="button button--secondary standalone-back">Back</button>
              </div>
              <p class="eyebrow">Vacancies</p>
              <h1>Current opportunities</h1>
              <p class="legal-intro">Browse the latest vacancies posted by the school.</p>
              <div id="vacancies-table-wrap" class="vacancies-table-wrap"></div>
            </div>
          </div>
        `;

        const { vacancies, offline } = await fetchVacanciesFromFirestore();
        const tableWrap = section.querySelector('#vacancies-table-wrap');
        if (offline && !vacancies.length) {
          tableWrap.innerHTML = createOfflineNoticeMarkup({
            title: 'Vacancies unavailable right now',
            message: 'We could not load current vacancies because the connection is unavailable or the feed is temporarily unreachable.'
          });
        } else if (!vacancies.length) {
          tableWrap.innerHTML = '<div class="vacancies-empty">No vacancies are available at the moment.</div>';
        } else {
          tableWrap.innerHTML = `
            <table class="vacancies-table">
              <thead>
                <tr>
                  <th>Status</th>
                  <th>Pathway</th>
                  <th>Subjects</th>
                  <th>Posts</th>
                </tr>
              </thead>
              <tbody>
                ${vacancies.map((item) => `
                  <tr>
                    <td>${formatBadge(item)}</td>
                    <td>${escapeHtml(item.pathway || 'To be confirmed')}</td>
                    <td>${escapeHtml(item.subjects || 'To be confirmed')}</td>
                    <td>${escapeHtml(String(item.post || 0))}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        }

        const backButton = section.querySelector('.standalone-back');
        if (backButton) {
          backButton.addEventListener('click', () => {
            if (window.history.length > 1) {
              window.history.back();
            } else {
              window.location.assign('../home/');
            }
          });
        }

        app.appendChild(section);
      }

      renderPage().then(() => {
        initChatAssistant();
      }).catch((error) => {
        console.error('Failed to render vacancies page:', error);
      });

      window.addEventListener('storage', () => renderPage().catch(console.error));
      window.addEventListener('school-vacancies-updated', () => renderPage().catch(console.error));
    </script>
  </body>
</html>
