<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d3b66" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Matiri Boys' Senior School</title>
    <meta name="description" content="A modular landing page for Matiri Boys' Senior School." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Great+Vibes&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/header.css" />
    <link rel="stylesheet" href="../styles/mobile.css" />
    <link rel="stylesheet" href="../styles/chat-assistant.css" />
    <link rel="stylesheet" href="../styles/cookie-banner.css" />
    <link rel="icon" href="../logo/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="../logo/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../logo/apple-touch-icon.png" />
    <link rel="manifest" href="../manifest.json" />
  </head>
  <body>
    <div class="home-top">
      <div class="container school-intro">
        <div class="school-intro__content">
          <p class="eyebrow" data-text="" hidden></p>
          <h1>Matiri Boys' Senior School</h1>
          <p class="school-motto">School Motto: <span>READ &amp; LEAD</span></p>
        </div>
        <div class="school-intro__logo-wrap">
          <div class="school-intro__logo" aria-label="School logo">
            <img src="../logo/IMG-20260716-WA0000.jpg" alt="Matiri Boys School logo" />
          </div>
          <button class="school-intro__login" type="button" data-open-login>Login</button>
        </div>
        <div class="banner-visual" aria-hidden="true">
          <img class="banner-visual__image banner-visual__image--active" src="../images/top/learners&teacher.jpeg" alt="" />
          <img class="banner-visual__image" src="../images/top/Bus.jpeg" alt="" />
        </div>
      </div>
    </div>
    <div id="app"></div>
    <div class="login-modal__backdrop" data-close-login hidden></div>
    <div class="login-modal" id="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title" hidden>
      <div class="login-modal__panel">
        <button class="login-modal__close" type="button" data-close-login aria-label="Close login">×</button>
        <h2 id="login-modal-title">Login</h2>
        <form class="login-modal__form">
          <label class="login-modal__field">
            <span>Email</span>
            <input type="email" name="email" placeholder="Enter email" required />
          </label>
          <label class="login-modal__field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter password" required />
          </label>
          <button type="submit" id="login-submit" class="button button--primary login-modal__submit">Login</button>
          <button type="button" id="forgot-password-button" class="login-modal__forgot" data-forgot-password>Forgot password?</button>
          <p class="login-modal__status" aria-live="polite"></p>
        </form>
      </div>
    </div>
    <div class="login-modal" id="reset-modal" role="dialog" aria-modal="true" aria-labelledby="reset-modal-title" hidden>
      <div class="login-modal__panel">
        <button class="login-modal__close" type="button" data-close-reset aria-label="Close reset password">×</button>
        <h2 id="reset-modal-title">Reset password</h2>
        <form class="login-modal__form" id="reset-password-form">
          <label class="login-modal__field">
            <span>Email</span>
            <input type="email" name="resetEmail" placeholder="Enter your email" required />
          </label>
          <button type="submit" id="reset-submit" class="button button--primary login-modal__submit">Send reset link</button>
          <button type="button" id="back-to-login-button" class="login-modal__forgot" data-back-to-login>Back to login</button>
          <p class="login-modal__status reset-modal__status" aria-live="polite"></p>
        </form>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script type="module" src="../js/main.js"></script>
    <script type="module">
      import { initChatAssistant } from '../js/chat-assistant.js';
      import { stateManager } from '../js/modules/state-manager.js';

      const typingBadge = document.querySelector('.school-intro .eyebrow');
      const bannerImages = Array.from(document.querySelectorAll('.banner-visual__image'));
      const SETTINGS_STORAGE_KEY = 'school-site-settings';
      const ADMISSIONS_SETTINGS_ID = 'admissions';
      let firebaseDb = null;
      let admissionsSettingsUnsubscribe = null;

      let typingLoopTimer = null;
      let typingLoopIndex = 0;
      let typingLoopTarget = '';

      const stopTypingLoop = () => {
        if (typingLoopTimer) {
          window.clearTimeout(typingLoopTimer);
          typingLoopTimer = null;
        }
      };

      const clearAdmissionsBadge = () => {
        if (!typingBadge) {
          return;
        }

        stopTypingLoop();
        typingBadge.textContent = '';
        typingBadge.dataset.text = '';
        typingBadge.classList.remove('is-open', 'is-closed');
        typingBadge.classList.add('is-hidden');
      };

      const startTypingLoop = (label) => {
        if (!typingBadge) {
          return;
        }

        const nextLabel = label || typingBadge.dataset.text || 'Admissions Open';
        typingLoopTarget = nextLabel;
        typingLoopIndex = 0;
        typingBadge.dataset.text = nextLabel;

        const typeNextCharacter = () => {
          if (!typingBadge) {
            return;
          }

          typingBadge.textContent = nextLabel.slice(0, typingLoopIndex + 1);
          typingLoopIndex += 1;

          if (typingLoopIndex < nextLabel.length) {
            typingLoopTimer = window.setTimeout(typeNextCharacter, 70);
            return;
          }

          typingLoopTimer = window.setTimeout(() => {
            eraseNextCharacter();
          }, 1200);
        };

        const eraseNextCharacter = () => {
          if (!typingBadge) {
            return;
          }

          typingBadge.textContent = nextLabel.slice(0, typingLoopIndex - 1);
          typingLoopIndex -= 1;

          if (typingLoopIndex > 0) {
            typingLoopTimer = window.setTimeout(eraseNextCharacter, 45);
            return;
          }

          typingLoopTimer = window.setTimeout(() => {
            startTypingLoop(nextLabel);
          }, 500);
        };

        stopTypingLoop();
        typeNextCharacter();
      };

      const updateAdmissionsBadge = (settings = {}) => {
        if (!typingBadge) {
          return;
        }

        const hasStatus = Object.prototype.hasOwnProperty.call(settings, 'admissionsOpen');
        if (!hasStatus) {
          clearAdmissionsBadge();
          return;
        }

        const isAdmissionsOpen = settings.admissionsOpen !== false;
        const nextLabel = isAdmissionsOpen ? 'Admissions Open' : 'Admissions Closed';

        typingBadge.dataset.text = nextLabel;
        typingBadge.classList.remove('is-hidden');
        typingBadge.classList.toggle('is-open', isAdmissionsOpen);
        typingBadge.classList.toggle('is-closed', !isAdmissionsOpen);
        startTypingLoop(nextLabel);
      };

      const applyStoredAdmissionsSettings = (settings = {}) => {
        localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings));
        updateAdmissionsBadge(settings);
      };

      function readStoredSiteSettings() {
        try {
          return JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY) || '{}');
        } catch (error) {
          return {};
        }
      }

      function syncAdmissionsStatusFromFirestore() {
        clearAdmissionsBadge();

        if (!window.firebase?.firestore || !window.firebase?.apps?.length) {
          return;
        }

        try {
          firebaseDb = window.firebase.firestore();

          if (admissionsSettingsUnsubscribe) {
            admissionsSettingsUnsubscribe();
          }

          admissionsSettingsUnsubscribe = firebaseDb
            .collection('site-settings')
            .doc(ADMISSIONS_SETTINGS_ID)
            .onSnapshot(
              (snapshot) => {
                if (snapshot.exists) {
                  const settings = snapshot.data() || {};
                  applyStoredAdmissionsSettings(settings);
                  return;
                }

                clearAdmissionsBadge();
              },
              (error) => {
                console.warn('Firestore site settings read failed:', error);
                clearAdmissionsBadge();
              }
            );
        } catch (error) {
          console.warn('Firestore site settings listener failed:', error);
          clearAdmissionsBadge();
        }
      }

      window.addEventListener('storage', (event) => {
        if (event.key !== SETTINGS_STORAGE_KEY) {
          return;
        }

        try {
          const nextSettings = JSON.parse(event.newValue || '{}');
          updateAdmissionsBadge(nextSettings);
        } catch (error) {
          updateAdmissionsBadge({});
        }
      });

      window.addEventListener('focus', () => {
        syncAdmissionsStatusFromFirestore();
      });

      syncAdmissionsStatusFromFirestore();
      if (bannerImages.length > 1) {
        let activeIndex = 0;

        const rotateBanner = () => {
          const currentImage = bannerImages[activeIndex];
          const nextIndex = (activeIndex + 1) % bannerImages.length;
          const nextImage = bannerImages[nextIndex];

          currentImage.classList.remove('banner-visual__image--active');
          currentImage.classList.add('banner-visual__image--exit');
          nextImage.classList.add('banner-visual__image--active');
          nextImage.classList.remove('banner-visual__image--exit');

          window.setTimeout(() => {
            currentImage.classList.remove('banner-visual__image--exit');
            activeIndex = nextIndex;
          }, 1100);
        };

        window.setInterval(rotateBanner, 9000);
      }

      const loginButton = document.querySelector('[data-open-login]');
      const loginModal = document.getElementById('login-modal');
      const resetModal = document.getElementById('reset-modal');
      const loginBackdrop = document.querySelector('.login-modal__backdrop');
      const loginForm = loginModal?.querySelector('.login-modal__form');
      const resetForm = document.getElementById('reset-password-form');
      const loginStatus = loginModal?.querySelector('.login-modal__status');
      const resetStatus = resetModal?.querySelector('.reset-modal__status');

      const FIREBASE_CONFIG = {
        apiKey: 'AIzaSyBIGqZLYcDg3CR5VamDwBhtOOfl2Y0NYeI',
        authDomain: 'timotech-films.firebaseapp.com',
        projectId: 'timotech-films',
        storageBucket: "timotech-films.firebasestorage.app",
        messagingSenderId: "563809562931",
        appId: "1:563809562931:web:750ff7e819f2d57e9dce46"
      };

      const RESET_ACTION_URL = 'https://timotech-films.web.app/reset-password/';

      const sendPasswordResetRequest = async (email) => {
        try {
          return await auth.sendPasswordResetEmail(email, {
            url: RESET_ACTION_URL,
            handleCodeInApp: true
          });
        } catch (error) {
          const message = error?.message || '';
          if (message.includes('unauthorized-continue-uri') || message.includes('allowlisted')) {
            return auth.sendPasswordResetEmail(email);
          }

          throw error;
        }
      };

      const openLoginModal = () => {
        if (!loginModal || !loginBackdrop) return;
        loginModal.hidden = false;
        if (resetModal) {
          resetModal.hidden = true;
        }
        loginBackdrop.hidden = false;
        document.body.classList.add('has-login-modal');
        loginModal.querySelector('input')?.focus();
      };

      const openResetModal = () => {
        if (!resetModal || !loginBackdrop) return;
        resetModal.hidden = false;
        loginModal.hidden = true;
        loginBackdrop.hidden = false;
        document.body.classList.add('has-login-modal');
        resetModal.querySelector('input')?.focus();
      };

      const closeAllModals = () => {
        if (!loginBackdrop) return;
        loginModal.hidden = true;
        if (resetModal) {
          resetModal.hidden = true;
        }
        loginBackdrop.hidden = true;
        document.body.classList.remove('has-login-modal');
      };

      loginButton?.addEventListener('click', openLoginModal);
      loginBackdrop?.addEventListener('click', closeAllModals);
      loginModal?.querySelector('[data-close-login]')?.addEventListener('click', closeAllModals);
      resetModal?.querySelector('[data-close-reset]')?.addEventListener('click', closeAllModals);
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !loginModal?.hidden) {
          closeAllModals();
        }
        if (event.key === 'Escape' && !resetModal?.hidden) {
          closeAllModals();
        }
      });

      let auth = null;

      if (window.firebase?.app && typeof window.firebase.initializeApp === 'function') {
        const hasConfig = FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.authDomain && FIREBASE_CONFIG.projectId && FIREBASE_CONFIG.appId;

        if (hasConfig) {
          if (!window.firebase.apps?.length) {
            window.firebase.initializeApp(FIREBASE_CONFIG);
          }

          auth = window.firebase.auth();
          auth.useDeviceLanguage?.();
        } else {
          if (loginStatus) {
            loginStatus.textContent = 'Firebase config is not set yet. Add your Firebase web config values in the page script.';
          }
        }
      } else if (loginStatus) {
        loginStatus.textContent = 'Firebase SDK did not load. Check the network connection and Firebase script tags.';
      }

      loginForm?.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (!auth) {
          if (loginStatus) {
            loginStatus.textContent = 'Firebase Auth is not ready. Add your Firebase configuration first.';
          }
          return;
        }

        const submitButton = loginForm.querySelector('button[type="submit"]');
        const formData = new FormData(loginForm);
        const email = String(formData.get('email') || '').trim();
        const password = String(formData.get('password') || '');

        if (!email || !password) {
          if (loginStatus) {
            loginStatus.textContent = 'Please enter both your email and password.';
          }
          return;
        }

        // Show loading state
        stateManager.setButtonLoading(submitButton?.id || 'login-submit', true, {
          loadingText: 'Signing in...'
        });

        if (loginStatus) {
          loginStatus.textContent = '';
        }

        try {
          const credential = await auth.signInWithEmailAndPassword(email, password);
          
          // Hide loading state on success
          stateManager.setButtonLoading(submitButton?.id || 'login-submit', false);
          
          if (loginStatus) {
            loginStatus.textContent = `Welcome back, ${credential.user?.email || 'admin'}.`;
          }
          
          // Redirect after brief delay
          window.setTimeout(() => {
            window.location.href = '../admin/';
          }, 500);
        } catch (error) {
          // Hide loading state on error
          stateManager.setButtonLoading(submitButton?.id || 'login-submit', false);
          
          if (loginStatus) {
            loginStatus.textContent = error?.message || 'Unable to sign in right now.';
          }
        }
      });

      loginModal?.querySelector('[data-forgot-password]')?.addEventListener('click', () => {
        openResetModal();
      });

      resetModal?.querySelector('[data-back-to-login]')?.addEventListener('click', () => {
        openLoginModal();
      });

      resetForm?.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (!auth) {
          if (resetStatus) {
            resetStatus.textContent = 'Firebase Auth is not ready. Add your Firebase configuration first.';
          }
          return;
        }

        const submitButton = resetForm.querySelector('button[type="submit"]');
        const formData = new FormData(resetForm);
        const email = String(formData.get('resetEmail') || '').trim();
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!email) {
          if (resetStatus) {
            resetStatus.textContent = 'Enter your email address so a reset link can be sent.';
          }
          return;
        }

        if (!emailPattern.test(email)) {
          if (resetStatus) {
            resetStatus.textContent = 'Please enter a valid email address.';
          }
          return;
        }

        stateManager.setButtonLoading(submitButton?.id || 'reset-submit', true, {
          loadingText: 'Sending...'
        });

        if (resetStatus) {
          resetStatus.textContent = '';
        }

        try {
          await sendPasswordResetRequest(email);
          stateManager.setButtonLoading(submitButton?.id || 'reset-submit', false);

          if (resetStatus) {
            resetStatus.textContent = 'If that account exists, a password reset link has been sent to your email.';
          }

          resetForm.reset();
          submitButton?.focus?.();
        } catch (error) {
          stateManager.setButtonLoading(submitButton?.id || 'reset-submit', false);

          if (resetStatus) {
            resetStatus.textContent = error?.message || 'Unable to send a reset email.';
          }
        }
      });

      initChatAssistant();
    </script>
  </body>
</html>
