<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d3b66" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Matiri Boys' Senior School</title>
    <meta name="description" content="A modular landing page for Matiri Boys' Senior School." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Great+Vibes&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/header.css" />
    <link rel="stylesheet" href="../styles/mobile.css" />
    <link rel="stylesheet" href="../styles/chat-assistant.css" />
    <link rel="stylesheet" href="../styles/cookie-banner.css" />
    <link rel="icon" href="../logo/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="../logo/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="../logo/apple-touch-icon.png" />
    <link rel="manifest" href="../manifest.json" />
  </head>
  <body>
    <div class="home-top">
      <div class="container school-intro">
        <div class="school-intro__content">
          <p class="eyebrow" data-text="Admissions Open">Admissions Open</p>
          <h1>Matiri Boys' Senior School</h1>
          <p class="school-motto">School Motto: <span>READ &amp; LEAD</span></p>
        </div>
        <div class="school-intro__logo-wrap">
          <div class="school-intro__logo" aria-label="School logo">
            <img src="../logo/IMG-20260716-WA0000.jpg" alt="Matiri Boys School logo" />
          </div>
          <button class="school-intro__login" type="button" data-open-login>Login</button>
        </div>
        <div class="banner-visual" aria-hidden="true">
          <img class="banner-visual__image banner-visual__image--active" src="../images/top/learners&teacher.jpeg" alt="" />
          <img class="banner-visual__image" src="../images/top/Bus.jpeg" alt="" />
        </div>
      </div>
    </div>
    <div id="app"></div>
    <div class="login-modal__backdrop" data-close-login hidden></div>
    <div class="login-modal" id="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title" hidden>
      <div class="login-modal__panel">
        <button class="login-modal__close" type="button" data-close-login aria-label="Close login">×</button>
        <h2 id="login-modal-title">Login</h2>
        <form class="login-modal__form">
          <label class="login-modal__field">
            <span>Email</span>
            <input type="email" name="email" placeholder="Enter email" required />
          </label>
          <label class="login-modal__field">
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter password" required />
          </label>
          <button type="submit" class="button button--primary login-modal__submit">Login</button>
          <button type="button" class="login-modal__forgot" data-forgot-password>Forgot password?</button>
          <p class="login-modal__status" aria-live="polite"></p>
        </form>
      </div>
    </div>
    <script type="module" src="../js/main.js"></script>
    <script type="module">
      import { initChatAssistant } from '../js/chat-assistant.js';

      const typingBadge = document.querySelector('.school-intro .eyebrow');
      const bannerImages = Array.from(document.querySelectorAll('.banner-visual__image'));
      if (bannerImages.length > 1) {
        let activeIndex = 0;

        const rotateBanner = () => {
          const currentImage = bannerImages[activeIndex];
          const nextIndex = (activeIndex + 1) % bannerImages.length;
          const nextImage = bannerImages[nextIndex];

          currentImage.classList.remove('banner-visual__image--active');
          currentImage.classList.add('banner-visual__image--exit');
          nextImage.classList.add('banner-visual__image--active');
          nextImage.classList.remove('banner-visual__image--exit');

          window.setTimeout(() => {
            currentImage.classList.remove('banner-visual__image--exit');
            activeIndex = nextIndex;
          }, 1100);
        };

        window.setInterval(rotateBanner, 9000);
      }

      const loginButton = document.querySelector('[data-open-login]');
      const loginModal = document.getElementById('login-modal');
      const loginBackdrop = document.querySelector('.login-modal__backdrop');
      const loginForm = loginModal?.querySelector('.login-modal__form');
      const loginStatus = loginModal?.querySelector('.login-modal__status');

      const openLoginModal = () => {
        if (!loginModal || !loginBackdrop) return;
        loginModal.hidden = false;
        loginBackdrop.hidden = false;
        document.body.classList.add('has-login-modal');
        loginModal.querySelector('input')?.focus();
      };

      const closeLoginModal = () => {
        if (!loginModal || !loginBackdrop) return;
        loginModal.hidden = true;
        loginBackdrop.hidden = true;
        document.body.classList.remove('has-login-modal');
      };

      loginButton?.addEventListener('click', openLoginModal);
      loginBackdrop?.addEventListener('click', closeLoginModal);
      loginModal?.querySelector('[data-close-login]')?.addEventListener('click', closeLoginModal);
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !loginModal?.hidden) {
          closeLoginModal();
        }
      });

      loginForm?.addEventListener('submit', (event) => {
        event.preventDefault();
        if (loginStatus) {
          loginStatus.textContent = 'Login form is ready. Authentication logic will be added next.';
        }
      });

      loginModal?.querySelector('[data-forgot-password]')?.addEventListener('click', () => {
        if (loginStatus) {
          loginStatus.textContent = 'Password reset flow will be added next.';
        }
      });

      if (typingBadge) {
        const fullText = typingBadge.dataset.text || typingBadge.textContent.trim();
        let index = 0;
        let deleting = false;

        const updateBadge = () => {
          typingBadge.textContent = fullText.slice(0, index);

          if (!deleting && index < fullText.length) {
            index += 1;
            window.setTimeout(updateBadge, 140);
            return;
          }

          if (!deleting && index === fullText.length) {
            deleting = true;
            window.setTimeout(updateBadge, 900);
            return;
          }

          if (deleting && index > 0) {
            index -= 1;
            window.setTimeout(updateBadge, 70);
            return;
          }

          if (deleting && index === 0) {
            deleting = false;
            window.setTimeout(updateBadge, 420);
          }
        };

        window.setTimeout(updateBadge, 400);
      }

      initChatAssistant();
    </script>
  </body>
</html>
