<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Prospectus | Matiri Boys' Senior School</title>
    <meta name="description" content="School prospectus information for Matiri Boys' Senior School." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles/shared.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/header.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/mobile.css" />
    <link rel="stylesheet" href="../styles/chat-assistant.css" />
    <link rel="icon" href="../logo/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="../logo/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <section class="legal-page-shell">
      <div class="container academics-card">
        <div class="standalone-topbar">
          <a href="../home/" class="button button--secondary standalone-back" target="_self">Back</a>
        </div>
        <p class="eyebrow">Downloads</p>
        <h1 class="academics-headline">School Prospectus</h1>
        <p class="academics-intro">The school prospectus is being prepared for publication. Please contact the school for updated information and admissions guidance.</p>
        <div class="download-card" id="download-card">
          <p>The uploaded document will appear here once it is added from the admin page.</p>
        </div>
      </div>
    </section>
    <script type="module">
      import { initChatAssistant } from '../js/chat-assistant.js';
      initChatAssistant();

      const downloadCard = document.getElementById('download-card');
      const params = new URLSearchParams(window.location.search);
      const fileUrl = params.get('url');
      const documentTitle = params.get('title') || 'Uploaded document';
      const fileName = params.get('fileName') || documentTitle;
      const mimeType = params.get('mimeType') || '';

      if (fileUrl && downloadCard) {
        const isImage = mimeType.startsWith('image/');
        const isPdf = mimeType === 'application/pdf';
        const previewMarkup = isImage
          ? `<div style="margin-top: 1rem;"><img src="${fileUrl}" alt="${documentTitle}" style="max-width: 100%; border-radius: 12px;" /></div>`
          : isPdf
            ? `<div style="margin-top: 1rem;"><iframe src="${fileUrl}" title="${documentTitle}" loading="lazy" style="width: 100%; min-height: 460px; border: 0; border-radius: 12px;"></iframe></div>`
            : '';

        downloadCard.innerHTML = `
          <p><strong>${documentTitle}</strong></p>
          <p>${fileName}</p>
          <a class="button button--primary" href="${fileUrl}" target="_blank" rel="noopener noreferrer" download="${fileName}">Open / download document</a>
          ${previewMarkup}
        `;
      }
    </script>
  </body>
</html>
